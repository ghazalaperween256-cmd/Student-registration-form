<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6c3fc5, #9b7de0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .card-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .card-header .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card-header p {
      font-size: 13px;
      color: #6b6b80;
      margin-top: 4px;
    }

    .divider {
      height: 3px;
      background: linear-gradient(90deg, #6c3fc5, #9b7de0);
      border-radius: 10px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    label span.req { color: #6c3fc5; }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d4cef0;
      border-radius: 8px;
      font-size: 13.5px;
      color: #1a1a2e;
      background: #f7f5ff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Segoe UI', sans-serif;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #6c3fc5;
      box-shadow: 0 0 0 3px rgba(108,63,197,0.12);
      background: white;
    }

    textarea { resize: vertical; min-height: 80px; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 7px;
      text-transform: none;
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: 0;
      cursor: pointer;
      color: #1a1a2e;
    }

    input[type="radio"] { width: auto; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6c3fc5, #9b7de0);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .success-msg {
      display: none;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      color: #166534;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      text-align: center;
      margin-top: 14px;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #9b9baa;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="icon">🎓</div>
    <h1>Student Registration Form</h1>
    <p>Fill in your details to register for the course</p>
  </div>
  <div class="divider"></div>

  <div id="regForm">

    <!-- Full Name -->
    <div class="form-group">
      <label>Full Name <span class="req">*</span></label>
      <input type="text" id="name" placeholder="e.g. Ghazala Perween" />
    </div>

    <!-- Email & Phone -->
    <div class="row-2">
      <div class="form-group">
        <label>Email <span class="req">*</span></label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label>Phone <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="+91 XXXXXXXXXX" />
      </div>
    </div>

    <!-- DOB & Gender -->
    <div class="row-2">
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob" />
      </div>
      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Female" checked /> Female</label>
          <label><input type="radio" name="gender" value="Male" /> Male</label>
        </div>
      </div>
    </div>

    <!-- Course -->
    <div class="form-group">
      <label>Select Course <span class="req">*</span></label>
      <select id="course">
        <option value="">-- Choose a course --</option>
        <option>Web Development</option>
        <option>Python Programming</option>
        <option>Data Science</option>
        <option>Java Programming</option>
        <option>C / C++ Basics</option>
      </select>
    </div>

    <!-- Address -->
    <div class="form-group">
      <label>Address</label>
      <textarea id="address" placeholder="Your full address..."></textarea>
    </div>

    <!-- Submit -->
    <button class="btn" onclick="submitForm()">✅ Register Now</button>

    <div class="success-msg" id="successMsg">
      🎉 Registration successful! We'll contact you soon.
    </div>
  </div>

  <div class="footer-note">Made with HTML &amp; CSS · Ghazala Perween</div>
</div>

<script>
  function submitForm() {
    const name   = document.getElementById('name').value.trim();
    const email  = document.getElementById('email').value.trim();
    const phone  = document.getElementById('phone').value.trim();
    const course = document.getElementById('course').value;

    if (!name || !email || !phone || !course) {
      alert('⚠️ Please fill all required fields (marked with *)');
      return;
    }

    document.getElementById('successMsg').style.display = 'block';
    document.querySelector('.btn').textContent = '✔ Registered!';
    document.querySelector('.btn').style.background = '#22c55e';
  }
</script>

</body>
</html>
